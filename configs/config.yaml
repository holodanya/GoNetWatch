targets:
  - name: "Example Website"
    type: "http"
    protocol: "http"
    address: "https://example.com"
    interval_sec: 30
  
  - name: "HTTPBin Service"
    type: "http-head"
    protocol: "http-head"
    address: "https://httpbin.org/status/200"
    interval_sec: 15
  
  - name: "DNS Server (1.1.1.1:53)"
    type: "tcp"
    protocol: "tcp"
    address: "1.1.1.1:53"
    interval_sec: 10

influxdb:
  url: "http://localhost:8086"
  token: "INFLUX_TOKEN"
  org: "gonetwatch"
  bucket: "network_metrics"

telegram:
  bot_token: ""
  chat_ids: []


