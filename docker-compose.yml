services:
  influxdb:
    image: influxdb:2.7
    container_name: gonetwatch_influx
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_ADMIN_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD:-changeme}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG:-gonetwatch}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET:-network_metrics}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN}
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:latest
    container_name: gonetwatch_grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_ORG:-gonetwatch}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET:-network_metrics}
    restart: unless-stopped
    depends_on:
      influxdb:
        condition: service_healthy

  gonetwatch:
    build: .
    container_name: gonetwatch_app
    restart: unless-stopped
    depends_on:
      influxdb:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./configs:/app/configs
      - ./import:/app/import

volumes:
  influxdb_data:
  influxdb_config:
  grafana_data:
